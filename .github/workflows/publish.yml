name: Publish
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [main]
jobs:
  generate-insights:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      models: read
    steps:
      - uses: actions/checkout@v4

      - uses: urmzd/github-insights@main
        with:
          commit-name: "sr-releaser[bot]"
          commit-email: "sr-releaser[bot]@users.noreply.github.com"
          template: ecosystem
