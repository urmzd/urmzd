  .t { font-family: -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif; font-variant-numeric: tabular-lining; }
  .t-h { font-size: 15px; fill: #eef6ff; letter-spacing: 1.6px; font-weight: 800; }
  .t-sub { font-size: 11px; fill: #b7c3d7; }
  .t-label { font-size: 12px; fill: #b7c3d7; }
  .t-value { font-size: 11px; fill: #b7c3d7; }
  .t-subhdr { font-size: 11px; fill: #b7c3d7; letter-spacing: 1px; font-weight: 800; }
  .t-stat-label { font-size: 10px; fill: #b7c3d7; font-weight: 800; letter-spacing: 0.8px; }
  .t-stat-value { font-size: 24px; font-weight: 800; }
  .t-card-title { font-size: 12px; fill: #45b3ff; font-weight: 700; }
  .t-card-detail { font-size: 11px; fill: #b7c3d7; }
  .t-pill { font-size: 11px; font-weight: 600; }
  .t-bullet { font-size: 12px; fill: #eef6ff; }
  .bg-fill { fill: #090d14; }
  .card-fill { fill: #111827; }
  .surface-fill { fill: #111827; }
  .surface-stroke { stroke: #2f3b4f; }
  .border-stroke { stroke: #2f3b4f; }
  .muted-fill { fill: #7f8ca3; }
  .secondary-fill { fill: #b7c3d7; }
  .soft-line { stroke: #2f3b4f; stroke-opacity: 0.45; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes scaleIn {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  @keyframes drawPath {
    from { stroke-dashoffset: var(--path-length); }
    to { stroke-dashoffset: 0; }
  }
  @keyframes radarReveal {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 0.6; }
  }
  .fade-1 { animation: fadeIn 0.6s ease-out 0.1s both; }
  .fade-2 { animation: fadeIn 0.6s ease-out 0.25s both; }
  .fade-3 { animation: fadeIn 0.6s ease-out 0.4s both; }
  .fade-4 { animation: fadeIn 0.6s ease-out 0.55s both; }
  .fade-5 { animation: fadeIn 0.6s ease-out 0.7s both; }
  .fade-6 { animation: fadeIn 0.6s ease-out 0.85s both; }
