  .t { font-family: -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif; font-variant-numeric: tabular-lining; }
  .t-h { font-size: 15px; fill: #172033; letter-spacing: 1.6px; font-weight: 800; }
  .t-sub { font-size: 11px; fill: #4b5870; }
  .t-label { font-size: 12px; fill: #4b5870; }
  .t-value { font-size: 11px; fill: #4b5870; }
  .t-subhdr { font-size: 11px; fill: #4b5870; letter-spacing: 1px; font-weight: 800; }
  .t-stat-label { font-size: 10px; fill: #4b5870; font-weight: 800; letter-spacing: 0.8px; }
  .t-stat-value { font-size: 24px; font-weight: 800; }
  .t-card-title { font-size: 12px; fill: #075fce; font-weight: 700; }
  .t-card-detail { font-size: 11px; fill: #4b5870; }
  .t-pill { font-size: 11px; font-weight: 600; }
  .t-bullet { font-size: 12px; fill: #172033; }
  .bg-fill { fill: #f7f9fc; }
  .card-fill { fill: #ffffff; }
  .surface-fill { fill: #ffffff; }
  .surface-stroke { stroke: #c9d5e4; }
  .border-stroke { stroke: #c9d5e4; }
  .muted-fill { fill: #66738a; }
  .secondary-fill { fill: #4b5870; }
  .soft-line { stroke: #c9d5e4; stroke-opacity: 0.45; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes scaleIn {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  @keyframes drawPath {
    from { stroke-dashoffset: var(--path-length); }
    to { stroke-dashoffset: 0; }
  }
  @keyframes radarReveal {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 0.6; }
  }
  .fade-1 { animation: fadeIn 0.6s ease-out 0.1s both; }
  .fade-2 { animation: fadeIn 0.6s ease-out 0.25s both; }
  .fade-3 { animation: fadeIn 0.6s ease-out 0.4s both; }
  .fade-4 { animation: fadeIn 0.6s ease-out 0.55s both; }
  .fade-5 { animation: fadeIn 0.6s ease-out 0.7s both; }
  .fade-6 { animation: fadeIn 0.6s ease-out 0.85s both; }
