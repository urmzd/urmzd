<svg xmlns="http://www.w3.org/2000/svg" width="808" height="250" viewBox="0 0 808 250"><defs><style>
  .t { font-family: -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif; font-variant-numeric: tabular-lining; }
  .t-h { font-size: 14px; fill: #1f2328; letter-spacing: 2px; font-weight: 600; }
  .t-sub { font-size: 11px; fill: #656d76; }
  .t-label { font-size: 12px; fill: #656d76; }
  .t-value { font-size: 11px; fill: #656d76; }
  .t-subhdr { font-size: 11px; fill: #656d76; letter-spacing: 1px; font-weight: 600; }
