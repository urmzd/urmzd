  .t { font-family: -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif; font-variant-numeric: tabular-lining; }
  .t-h { font-size: 15px; fill: #172033; letter-spacing: 1.6px; font-weight: 800; }
  .t-sub { font-size: 11px; fill: #4b5870; }
  .t-label { font-size: 12px; fill: #4b5870; }
  .t-value { font-size: 11px; fill: #4b5870; }
  .t-subhdr { font-size: 11px; fill: #4b5870; letter-spacing: 1px; font-weight: 800; }
  .t-stat-label { font-size: 10px; fill: #4b5870; font-weight: 800; letter-spacing: 0.8px; }
  .t-stat-value { font-size: 24px; font-weight: 800; }
  .t-card-title { font-size: 12px; fill: #075fce; font-weight: 700; }
  .t-card-detail { font-size: 11px; fill: #4b5870; }
